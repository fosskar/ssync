name: release
# Version bumps are manual (workspace version in Cargo.toml); releasing is not:
# every push to main whose version has no v-tag yet gets tagged + released once
# nixbot reports green on that commit. No building here — nixbot's flake check
# (package + tests + VM tests) is the single CI; this workflow polls its check
# runs (nixbot/nix-eval, nixbot/nix-build) instead of duplicating the build.
on:
  push:
    branches: [main]
permissions:
  contents: write # creates the git tag + github release
  checks: read
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Cheap gate first: most pushes carry no version bump and exit here.
      - name: check for unreleased version
        id: gate
        run: |
          version=$(python3 -c 'import tomllib; print(tomllib.load(open("Cargo.toml","rb"))["workspace"]["package"]["version"])')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [ -n "$(git ls-remote --tags origin "refs/tags/v$version")" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi
      - name: wait for nixbot checks
        if: steps.gate.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for _ in $(seq 60); do
            state=$(gh api "repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/check-runs" \
              --jq '[.check_runs[] | select(.name | startswith("nixbot/"))]
                    | if length < 2 or any(.conclusion == null) then "pending"
                      elif all(.conclusion == "success") then "success"
                      else "failure" end')
            case "$state" in
              success) exit 0 ;;
              failure) echo "nixbot checks failed — not releasing"; exit 1 ;;
            esac
            sleep 60
          done
          echo "timed out waiting for nixbot"; exit 1
      - name: tag and github release
        if: steps.gate.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${{ steps.gate.outputs.version }}" --generate-notes --target "$GITHUB_SHA"
